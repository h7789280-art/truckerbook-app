<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruckerBook — All-in-one app for truck drivers</title>
  <meta name="description" content="TruckerBook — fuel tracking, trips, HOS timer, jobs, news and marketplace for truck drivers. 7 days free trial.">
  <meta property="og:title" content="TruckerBook — All-in-one trucking app">
  <meta property="og:description" content="Fuel tracking, trips, HOS timer, jobs, news and marketplace. 7 days free.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="/icons/icon-512x512.png">
  <meta name="theme-color" content="#0a0e1a">
  <link rel="icon" type="image/png" href="/icons/icon-192x192.png">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0e1a;
      --card: #111827;
      --card2: #1a2235;
      --border: #1e2a3f;
      --text: #e2e8f0;
      --dim: #64748b;
      --orange: #f59e0b;
      --orange-dark: #d97706;
      --green: #22c55e;
      --blue: #3b82f6;
      --red: #ef4444;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    a { color: var(--orange); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background: rgba(10, 14, 26, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 0;
    }

    nav .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .nav-logo {
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .lang-switch {
      display: flex;
      gap: 4px;
      background: var(--card);
      border-radius: 8px;
      padding: 3px;
    }

    .lang-btn {
      background: none;
      border: none;
      color: var(--dim);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: var(--orange);
      color: #000;
    }

    /* HERO */
    .hero {
      padding: 140px 0 80px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 800px;
      height: 800px;
      background: radial-gradient(circle, rgba(245, 158, 11, 0.08) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-icon {
      font-size: 4rem;
      margin-bottom: 20px;
      display: block;
    }

    .hero h1 {
      font-size: 3.2rem;
      font-weight: 800;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #fff 0%, var(--orange) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 1.25rem;
      color: var(--dim);
      max-width: 520px;
      margin: 0 auto 36px;
    }

    .btn-primary {
      display: inline-block;
      padding: 16px 40px;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: #000;
      font-size: 1.1rem;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(245, 158, 11, 0.3);
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 32px rgba(245, 158, 11, 0.45);
      text-decoration: none;
    }

    /* FLAGS */
    .flags-section {
      padding: 40px 0 60px;
      text-align: center;
    }

    .flags-section h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 24px;
    }

    .flags-row {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }

    .flag-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .flag-item span:first-child {
      font-size: 2rem;
    }

    .flag-item span:last-child {
      font-size: 0.7rem;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* FEATURES */
    .features {
      padding: 60px 0 80px;
    }

    .features h2 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 48px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .feature-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      transition: transform 0.2s, border-color 0.2s;
    }

    .feature-card:hover {
      transform: translateY(-4px);
      border-color: var(--orange);
    }

    .feature-icon {
      font-size: 2rem;
      margin-bottom: 12px;
      display: block;
    }

    .feature-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .feature-card p {
      font-size: 0.9rem;
      color: var(--dim);
      line-height: 1.5;
    }

    /* FOR WHO */
    .for-who {
      padding: 60px 0 80px;
    }

    .for-who h2 {
      text-align: center;
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 48px;
    }

    .who-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .who-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 24px;
      text-align: center;
    }

    .who-icon {
      font-size: 2.8rem;
      margin-bottom: 16px;
      display: block;
    }

    .who-card h3 {
      font-size: 1.15rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .who-card p {
      font-size: 0.9rem;
      color: var(--dim);
      line-height: 1.5;
    }

    /* PRICING */
    .pricing {
      padding: 60px 0 80px;
      text-align: center;
    }

    .pricing h2 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .pricing-sub {
      color: var(--dim);
      font-size: 1rem;
      margin-bottom: 40px;
    }

    .pricing-card {
      max-width: 420px;
      margin: 0 auto;
      background: linear-gradient(145deg, var(--card), var(--card2));
      border: 2px solid var(--orange);
      border-radius: 20px;
      padding: 40px 32px;
      position: relative;
      overflow: hidden;
    }

    .pricing-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--orange), var(--orange-dark));
    }

    .pricing-badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--orange), var(--orange-dark));
      color: #000;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 6px 18px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .pricing-price {
      font-size: 2.8rem;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .pricing-period {
      color: var(--dim);
      font-size: 0.95rem;
      margin-bottom: 24px;
    }

    .pricing-features {
      list-style: none;
      text-align: left;
      margin-bottom: 28px;
    }

    .pricing-features li {
      padding: 8px 0;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .pricing-features li::before {
      content: '\2713';
      color: var(--green);
      font-weight: 700;
      font-size: 1rem;
    }

    /* FOOTER */
    footer {
      border-top: 1px solid var(--border);
      padding: 32px 0;
      text-align: center;
      color: var(--dim);
      font-size: 0.85rem;
    }

    footer a {
      color: var(--orange);
    }

    footer .footer-links {
      margin-top: 8px;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .hero h1 { font-size: 2.2rem; }
      .hero p { font-size: 1.05rem; }
      .features-grid { grid-template-columns: 1fr; }
      .who-grid { grid-template-columns: 1fr; }
      .flags-row { gap: 12px; }
      .flag-item span:first-child { font-size: 1.6rem; }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .features-grid { grid-template-columns: repeat(2, 1fr); }
      .who-grid { grid-template-columns: repeat(3, 1fr); }
    }
  </style>
</head>
<body>

      },
      en: {
        heroSub: 'Everything a trucker needs in one app',
        heroBtn: 'Try for free',
        flagsTitle: '8 languages, 11 countries',
        featTitle: 'Features',
        features: [
          { icon: '\u26FD', title: 'Fuel tracking', desc: 'Fill-ups, consumption, station stats. Receipt photos with AI recognition.' },

          { icon: '\uD83D\uDCF0', title: 'News', desc: 'Industry news for US and Russia. AI summaries from top sources.' },
          { icon: '\uD83D\uDED2', title: 'Marketplace', desc: 'Repair shops, parts, cafes, motels, fuel stations \u2014 all nearby on the map.' }
        ],

        ],

        priceFeatures: [

        ],
        priceBtn: 'Start free'
      }
    };

    var currentLang = 'ru';

    function detectLang() {
      var nav = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      return nav.startsWith('ru') || nav.startsWith('uk') || nav.startsWith('be') || nav.startsWith('kk') ? 'ru' : 'en';
    }

    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.textContent === lang.toUpperCase());
      });
      render();
    }

    function render() {
      var t = i18n[currentLang];
      document.getElementById('hero-sub').textContent = t.heroSub;
      document.getElementById('hero-btn').textContent = t.heroBtn;
      document.getElementById('flags-title').textContent = t.flagsTitle;
      document.getElementById('feat-title').textContent = t.featTitle;

      var fg = document.getElementById('features-grid');
      fg.innerHTML = t.features.map(function(f) {
        return '<div class="feature-card"><span class="feature-icon">' + f.icon + '</span><h3>' + f.title + '</h3><p>' + f.desc + '</p></div>';
      }).join('');

      document.getElementById('who-title').textContent = t.whoTitle;
      var wg = document.getElementById('who-grid');
      wg.innerHTML = t.who.map(function(w) {
        return '<div class="who-card"><span class="who-icon">' + w.icon + '</span><h3>' + w.title + '</h3><p>' + w.desc + '</p></div>';
      }).join('');

      document.getElementById('price-title').textContent = t.priceTitle;
      document.getElementById('price-sub').textContent = t.priceSub;
      document.getElementById('price-badge').textContent = t.priceBadge;
      document.getElementById('price-period').textContent = t.pricePeriod;
      document.getElementById('price-list').innerHTML = t.priceFeatures.map(function(f) {
        return '<li>' + f + '</li>';
      }).join('');
      document.getElementById('price-btn').textContent = t.priceBtn;

      document.documentElement.lang = currentLang;
    }

    setLang(detectLang());
  </script>
</body>
